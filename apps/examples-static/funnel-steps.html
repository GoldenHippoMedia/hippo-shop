<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hippo Shop SDK — funnel steps</title>
    <style>
      :root { color-scheme: light dark; font: 16px/1.5 ui-sans-serif, system-ui, sans-serif; }
      body { max-width: 48rem; margin: 2rem auto; padding: 0 1rem; }
      ol.steps { list-style: none; padding: 0; counter-reset: step; }
      ol.steps li {
        counter-increment: step;
        display: flex;
        gap: 1rem;
        align-items: center;
        padding: 0.75rem 1rem;
        border: 1px solid color-mix(in srgb, CanvasText 15%, transparent);
        border-radius: 10px;
        margin-bottom: 0.5rem;
      }
      ol.steps li::before {
        content: counter(step);
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        width: 1.5rem;
        height: 1.5rem;
        border-radius: 50%;
        background: color-mix(in srgb, CanvasText 12%, transparent);
        display: inline-flex; align-items: center; justify-content: center;
      }
      ol.steps a { color: inherit; text-decoration: none; }
      ol.steps a:hover { text-decoration: underline; }
      .kind {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: color-mix(in srgb, CanvasText 55%, transparent);
        margin-left: auto;
      }
      .muted { color: color-mix(in srgb, CanvasText 60%, transparent); }
    </style>
  </head>
  <body>
    <h1 data-gh-funnel="bio-complete-3-main">
      <span data-field="name">Funnel</span>
    </h1>
    <p class="muted">Live funnel data — pasted as HTML, populated by the SDK.</p>

    <ol class="steps" data-gh-funnel="bio-complete-3-main">
      <template data-each="steps">
        <li>
          <a data-attr-href="url">
            <span data-field="name">Step</span>
          </a>
          <span class="kind" data-field="kind">—</span>
        </li>
      </template>
    </ol>

    <script
      src="../../packages/sdk/dist/gh.js"
      data-key="gh_pk_example_consumer_aaaaaa"
      data-brand="Gundry MD"
    ></script>
  </body>
</html>
